// This file contains configurations to resolve dependency issues
// between React component tasks and Java compilation tasks

afterEvaluate {
    // Configuration directe des tâches impliquées dans l'erreur
    def processResourcesTask = tasks.findByPath(':processResources')
    def frontCopyTask = tasks.findByPath(':frontCopy')
    
    if (processResourcesTask != null && frontCopyTask != null) {
        // Approche forte: Ajouter une dépendance explicite
        processResourcesTask.dependsOn(frontCopyTask)
        
        // Approche forte: Déclarer explicitement le chemin problématique comme entrée
        def srcGenResourcesDir = file("${project.projectDir}/build/src-gen/resources")
        processResourcesTask.inputs.dir(srcGenResourcesDir)
        
        // Assurer que le webapp directory est aussi une entrée
        def webappDir = file("${project.buildDir}/webapp")
        processResourcesTask.inputs.dir(webappDir)
        
        // Essayer d'accéder aux propriétés de destination
        try {
            if (frontCopyTask.hasProperty('destinationDir')) {
                processResourcesTask.inputs.dir(frontCopyTask.destinationDir)
            }
        } catch (Exception ignored) {}
        
        // Approche pour déboguer
        processResourcesTask.doFirst {
            logger.lifecycle("=== Configuration de processResources ===")
            logger.lifecycle("Dépendances de processResources: ${processResourcesTask.dependsOn}")
            logger.lifecycle("Inputs de processResources: ${processResourcesTask.inputs.files.files}")
            logger.lifecycle("=== Fin de la configuration ===")
        }
    }
    
    // Traiter spécifiquement la tâche de publication si elle existe
    def publishTask = tasks.findByPath(':publish')
    if (publishTask != null && processResourcesTask != null) {
        // S'assurer que la publication attend la completion de processResources
        publishTask.mustRunAfter(processResourcesTask)
        
        // Logger des informations sur la publication
        publishTask.doFirst {
            logger.lifecycle("=== Configuration de publish ===")
            logger.lifecycle("Dépendances de publish: ${publishTask.dependsOn}")
            logger.lifecycle("=== Fin de la configuration ===")
        }
    }
    
    // Traiter toutes les tâches de publication
    tasks.withType(org.gradle.api.publish.tasks.PublishToMavenRepository) { pubTask ->
        if (processResourcesTask != null) {
            // S'assurer que les tâches de publication dépendent de processResources
            pubTask.dependsOn(processResourcesTask)
            
            // S'assurer que frontCopy est exécuté avant toute publication
            if (frontCopyTask != null) {
                pubTask.dependsOn(frontCopyTask)
            }
        }
    }
    
    // Configuration des modules
    def reactModules = [
        project(':modules:axelor-studio')
    ]
    
    // Pour chaque module React
    reactModules.each { reactModule ->
        def moduleProcessResourcesTask = reactModule.tasks.findByName('processResources')
        def moduleFrontCopyTask = reactModule.tasks.findByName('frontCopy')
        
        if (moduleProcessResourcesTask != null && moduleFrontCopyTask != null) {
            // Configurer les dépendances au niveau du module
            moduleProcessResourcesTask.dependsOn(moduleFrontCopyTask)
            
            // Déclarer les répertoires importants
            def srcGenDir = file("${reactModule.projectDir}/build/src-gen/resources")
            if (srcGenDir.exists()) {
                moduleProcessResourcesTask.inputs.dir(srcGenDir)
            }
            
            def webappDir = file("${reactModule.buildDir}/webapp")
            if (webappDir.exists()) {
                moduleProcessResourcesTask.inputs.dir(webappDir)
            }
            
            // Configurer la destination de frontCopy comme entrée
            try {
                if (moduleFrontCopyTask.hasProperty('destinationDir')) {
                    moduleProcessResourcesTask.inputs.dir(moduleFrontCopyTask.destinationDir)
                }
            } catch (Exception ignored) {}
            
            // Configurer les tâches de publication du module
            reactModule.tasks.withType(org.gradle.api.publish.tasks.PublishToMavenRepository) { pubTask ->
                pubTask.dependsOn(moduleProcessResourcesTask)
                pubTask.dependsOn(moduleFrontCopyTask)
            }
        }
    }

    // Désactiver temporairement la validation pour processResources
    try {
        if (processResourcesTask != null) {
            processResourcesTask.notCompatibleWithConfigurationCache("Validation désactivée temporairement")
        }
    } catch (Exception ignored) {}
}
